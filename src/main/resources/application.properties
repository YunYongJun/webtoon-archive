spring.application.name=webtoon-archive

# 1. Database 연결 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/webtoon_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
# MySQL 계정 아이디 (기본은 root)
spring.datasource.username=root
# ★ MySQL 비밀번호를 입력하세요 ★
spring.datasource.password=1234

# 2. JPA / Hibernate 설정
# 서버를 켤 때마다 엔티티 구조를 바탕으로 테이블을 자동으로 만들어주는 옵션 (개발 단계에서 매우 편리함)
spring.jpa.hibernate.ddl-auto=update
# 데이터베이스에 어떤 쿼리가 날아가는지 터미널창에 보여주는 옵션
spring.jpa.show-sql=true
# 터미널창에 보여주는 SQL 쿼리를 보기 좋게 정렬해주는 옵션
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=yourSecretKeyMustBeVeryLongAndSecureMoreThan256BitsLong!!