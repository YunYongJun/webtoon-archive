<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 웹툰 아카이빙</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background-color: #f9f9f9; }
        h1, h2, h3 { color: #333; }
        .auth-section, .form-section, .list-section, .review-section, .search-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        .search-flex { display: flex; gap: 10px; align-items: flex-end; }
        .search-flex .form-group { margin-bottom: 0; flex: 1; }
        
        button { data-action: "submit"; background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #45a049; }
        .btn-search { background-color: #2196F3; }
        .btn-search:hover { background-color: #0b7dda; }
        .btn-reset { background-color: #f44336; }
        .btn-reset:hover { background-color: #da190b; }
        .btn-auth { background-color: #9c27b0; }
        .btn-auth:hover { background-color: #7b1fa2; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .review-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .stars { color: #ffbc00; font-weight: bold; }
        
        /* 인증 관련 레이아웃 */
        .auth-flex { display: flex; gap: 20px; }
        .auth-box { flex: 1; border: 1px dashed #ccc; padding: 15px; border-radius: 6px; }
        .welcome-box { display: flex; justify-content: space-between; align-items: center; background: #e3f2fd; padding: 15px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 나만의 웹툰 아카이빙 서비스</h1>

    <div id="authSection" class="auth-section">
        <div id="loggedOutView" class="auth-flex">
            <div class="auth-box">
                <h3>🔐 로그인</h3>
                <form id="loginForm">
                    <div class="form-group"><input type="text" id="loginId" placeholder="아이디" required></div>
                    <div class="form-group"><input type="password" id="loginPw" placeholder="비밀번호" required></div>
                    <button type="submit" class="btn-search">로그인</button>
                </form>
            </div>
            <div class="auth-box">
                <h3>📝 회원가입</h3>
                <form id="signupForm">
                    <div class="form-group"><input type="text" id="signupId" placeholder="아이디" required></div>
                    <div class="form-group"><input type="password" id="signupPw" placeholder="비밀번호" required></div>
                    <div class="form-group"><input type="text" id="signupNickname" placeholder="닉네임" required></div>
                    <button type="submit" class="btn-auth">가입하기</button>
                </form>
            </div>
        </div>

        <div id="loggedInView" class="welcome-box" style="display: none;">
            <span>👋 안녕하세요! 오늘도 즐거운 웹툰 탐색 되세요.</span>
            <button class="btn-reset" onclick="logout()">로그아웃</button>
        </div>
    </div>

    <div class="form-section">
        <h2>✨ 새 웹툰 등록하기</h2>
        <form id="webtoonForm">
            <div class="form-group"><label>웹툰 제목</label><input type="text" id="title" required placeholder="예: 화산귀환"></div>
            <div class="form-group"><label>작가명</label><input type="text" id="author" required placeholder="예: 비가/LICO"></div>
            <div class="form-group">
                <label>연재 플랫폼</label>
                <select id="platform">
                    <option value="네이버웹툰">네이버웹툰</option>
                    <option value="카카오페이지">카카오페이지</option>
                    <option value="카카오웹툰">카카오웹툰</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label>나의 감상 상태</label>
                <select id="status">
                    <option value="보는 중">보는 중</option>
                    <option value="완결">완결</option>
                    <option value="정주행 완료">정주행 완료</option>
                    <option value="하차">하차</option>
                </select>
            </div>
            <button type="submit">등록하기</button>
        </form>
    </div>

    <div class="search-section">
        <h2>🔍 조건별 웹툰 검색 (QueryDSL)</h2>
        <form id="searchForm" class="search-flex">
            <div class="form-group">
                <label>제목 검색</label>
                <input type="text" id="searchTitle" placeholder="검색할 제목 입력...">
            </div>
            <div class="form-group">
                <label>플랫폼 필터</label>
                <select id="searchPlatform">
                    <option value="">전체 플랫폼</option>
                    <option value="네이버웹툰">네이버웹툰</option>
                    <option value="카카오페이지">카카오페이지</option>
                    <option value="카카오웹툰">카카오웹툰</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label>상태 필터</label>
                <select id="searchStatus">
                    <option value="">전체 상태</option>
                    <option value="보는 중">보는 중</option>
                    <option value="완결">완결</option>
                    <option value="정주행 완료">정주행 완료</option>
                    <option value="하차">하차</option>
                </select>
            </div>
            <button type="submit" class="btn-search">검색</button>
            <button type="button" class="btn-reset" onclick="resetSearch()">초기화</button>
        </form>
    </div>

    <div class="list-section">
        <h2>내 아카이브 리스트</h2>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작가</th>
                    <th>플랫폼</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="webtoonTableBody"></tbody>
        </table>
    </div>

    <div id="reviewSection" class="review-section" style="display: none;">
        <h3>💬 <span id="selectedWebtoonTitle"></span> - 리뷰 및 별점</h3>
        <form id="reviewForm" style="margin-bottom: 20px;">
            <input type="hidden" id="selectedWebtoonId">
            <div class="form-group">
                <label>별점</label>
                <select id="rating">
                    <option value="5">⭐⭐⭐⭐⭐ (5점)</option>
                    <option value="4">⭐⭐⭐⭐ (4점)</option>
                    <option value="3">⭐⭐⭐ (3점)</option>
                    <option value="2">⭐⭐ (2점)</option>
                    <option value="1">⭐ (1점)</option>
                </select>
            </div>
            <div class="form-group">
                <label>한 줄 평</label>
                <input type="text" id="comment" required placeholder="이 웹툰에 대한 한 줄 평을 남겨주세요!">
            </div>
            <button type="submit">리뷰 등록</button>
        </form>
        <div id="reviewList"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            checkLoginStatus();
            loadWebtoons();
        });
        
        let currentWebtoonId = null;

        // 공통 헤더 제공 함수 (JWT 토큰 자동 장착)
        function getAuthHeaders() {
            const token = localStorage.getItem("jwtToken");
            const headers = { 'Content-Type': 'application/json' };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`; // 💡 백엔드 Security가 인식할 헤더 포맷
            }
            return headers;
        }

        // 로그인 상태 체크 UI 전환
        function checkLoginStatus() {
            const token = localStorage.getItem("jwtToken");
            if (token) {
                document.getElementById("loggedOutView").style.display = "none";
                document.getElementById("loggedInView").style.display = "flex";
            } else {
                document.getElementById("loggedOutView").style.display = "flex";
                document.getElementById("loggedInView").style.display = "none";
            }
        }

        // 회원가입 처리
        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const signupData = {
                username: document.getElementById("signupId").value,
                password: document.getElementById("signupPw").value,
                nickname: document.getElementById("signupNickname").value
            };

            fetch('/api/users/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(signupData)
            }).then(response => {
                if(response.ok) {
                    alert("회원가입이 완료되었습니다! 로그인을 진행해 주세요.");
                    document.getElementById("signupForm").reset();
                } else {
                    alert("회원가입 실패 (아이디 중복 확인)");
                }
            });
        });

        // 로그인 처리 및 JWT 로컬스토리지 저장
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const loginData = {
                username: document.getElementById("loginId").value,
                password: document.getElementById("loginPw").value
            };

            fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            })
            .then(response => {
                if(!response.ok) throw new Error("로그인 실패");
                return response.text(); // 토큰 문자열 수신
            })
            .then(token => {
                localStorage.setItem("jwtToken", token); // 로컬 스토리지에 저장!
                alert("로그인 성공!");
                document.getElementById("loginForm").reset();
                checkLoginStatus();
                loadWebtoons();
            })
            .catch(err => alert("아이디 또는 비밀번호를 확인하세요."));
        });

        // 로그아웃
        function logout() {
            localStorage.removeItem("jwtToken");
            alert("로그아웃 되었습니다.");
            checkLoginStatus();
            document.getElementById("reviewSection").style.display = "none";
            loadWebtoons();
        }

        // 1. 웹툰 목록 불러오기 (비로그인 권한용 - 전체공개 검색주소 호출)
        function loadWebtoons() {
            // 로그인 안 해도 볼 수 있게 아까 열어둔 시큐리티 프리패스 주소(/api/webtoons/search)를 기본으로 활용합니다.
            fetch('/api/webtoons/search')
                .then(response => response.json())
                .then(data => { renderTable(data); });
        }

        function renderTable(data) {
            const tableBody = document.getElementById("webtoonTableBody");
            tableBody.innerHTML = "";
            if (data.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>조건에 맞는 웹툰이 없습니다.</td></tr>";
                return;
            }
            data.forEach((webtoon, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td><a href="#" onclick="openReviewSection(${webtoon.id}, '${webtoon.title}')"><strong>${webtoon.title}</strong></a></td>
                    <td>${webtoon.author}</td>
                    <td>${webtoon.platform}</td>
                    <td>${webtoon.status}</td>
                    <td>
                        <button onclick="deleteWebtoon(${webtoon.id})" style="background-color: #f44336; padding: 5px 10px; font-size: 12px;">삭제</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        // QueryDSL 동적 검색 요청
        document.getElementById("searchForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const title = document.getElementById("searchTitle").value;
            const platform = document.getElementById("searchPlatform").value;
            const status = document.getElementById("searchStatus").value;
            const url = `/api/webtoons/search?title=${encodeURIComponent(title)}&platform=${platform}&status=${status}`;

            fetch(url).then(response => response.json()).then(data => { renderTable(data); });
        });

        function resetSearch() {
            document.getElementById("searchForm").reset();
            loadWebtoons();
        }

        // 3. 웹툰 등록하기 (POST - JWT 보안 헤더 장착)
        document.getElementById("webtoonForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const webtoonData = {
                title: document.getElementById("title").value,
                author: document.getElementById("author").value,
                platform: document.getElementById("platform").value,
                status: document.getElementById("status").value
            };

            fetch('/api/webtoons', {
                method: 'POST',
                headers: getAuthHeaders(), // 🔥 인증 토큰 장착!
                body: JSON.stringify(webtoonData)
            }).then(response => {
                if(response.ok) {
                    alert("웹툰이 성공적으로 등록되었습니다!");
                    document.getElementById("webtoonForm").reset();
                    loadWebtoons();
                } else {
                    alert("웹툰 등록 권한이 없습니다. 로그인을 먼저 해주세요!");
                }
            });
        });

        // 4. 웹툰 삭제하기 (DELETE - JWT 보안 헤더 장착)
        function deleteWebtoon(id) {
            if (!confirm("정말 이 웹툰을 삭제하시겠습니까?")) return;
            fetch(`/api/webtoons/${id}`, { 
                method: 'DELETE',
                headers: getAuthHeaders() // 🔥 인증 토큰 장착!
            })
            .then(response => {
                if (response.ok) {
                    alert("삭제되었습니다.");
                    document.getElementById("reviewSection").style.display = "none";
                    loadWebtoons();
                } else {
                    alert("삭제 권한이 없습니다. 로그인을 먼저 해주세요!");
                }
            });
        }

        // 5. 리뷰 섹션 열기 & 리뷰 목록 조회
        function openReviewSection(id, title) {
            currentWebtoonId = id;
            document.getElementById("selectedWebtoonId").value = id;
            document.getElementById("selectedWebtoonTitle").innerText = title;
            document.getElementById("reviewSection").style.display = "block";
            loadReviews(id);
        }

        function loadReviews(webtoonId) {
            fetch(`/api/webtoons/${webtoonId}/reviews`)
                .then(response => response.json())
                .then(reviews => {
                    const reviewList = document.getElementById("reviewList");
                    reviewList.innerHTML = "";
                    if(reviews.length === 0) {
                        reviewList.innerHTML = "<p style='color:#777;'>아직 작성된 리뷰가 없습니다. 첫 리뷰를 작성해 보세요!</p>";
                        return;
                    }
                    reviews.forEach(review => {
                        const starString = "⭐".repeat(review.rating);
                        reviewList.innerHTML += `<div class="review-item"><span class="stars">${starString}</span><p style="margin: 5px 0 0 0;">${review.comment}</p></div>`;
                    });
                });
        }

        // 6. 리뷰 등록하기 (POST - JWT 보안 헤더 장착)
        document.getElementById("reviewForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const webtoonId = document.getElementById("selectedWebtoonId").value;
            const reviewData = {
                rating: parseInt(document.getElementById("rating").value),
                comment: document.getElementById("comment").value
            };

            fetch(`/api/webtoons/${webtoonId}/reviews`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(reviewData)
            }).then(response => {
                if(response.ok) {
                    alert("리뷰가 등록되었습니다!");
                    document.getElementById("comment").value = "";
                    loadReviews(webtoonId);
                } else {
                    alert("리뷰 등록 권한이 없습니다. 로그인을 먼저 해주세요!");
                }
            });
        });
    </script>
</body>
</html>
